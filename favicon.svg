<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00bdbd"/>
      <stop offset="100%" stop-color="#5293e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Letter-P mark (white) -->
  <!-- Vertical stem: x=142..214, y=118..394 -->
  <rect x="142" y="118" width="72" height="276" rx="12" fill="white"/>
  <!-- Bowl cap (top horizontal bar connecting stem to bowl) -->
  <rect x="142" y="118" width="192" height="68" rx="12" fill="white"/>
  <!-- Bowl bottom bar -->
  <rect x="142" y="258" width="192" height="68" rx="12" fill="white"/>
  <!-- Bowl right curve: a half-ellipse from y=118 to y=326, right side -->
  <!-- Implemented as a thick arc path -->
  <path d="M 334 152 A 104 104 0 0 1 334 292" fill="none" stroke="white" stroke-width="68" stroke-linecap="round"/>
</svg>
