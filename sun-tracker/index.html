<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sun Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: #07080f;
    color: #d8d0c4;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    gap: clamp(0.6rem, 2.2vh, 1.5rem);
    padding: 1.25rem;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #time-display { text-align: center; line-height: 1; }

  #clock {
    font-size: clamp(2rem, 8vw, 3.2rem);
    font-weight: 200;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: #ede5d4;
  }

  #date {
    font-size: clamp(0.65rem, 2vw, 0.82rem);
    color: #4a4a4a;
    margin-top: 0.45rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #canvas-wrap {
    width: 100%;
    max-width: 520px;
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }

  #sun-times {
    display: flex;
    gap: clamp(2rem, 8vw, 3.5rem);
    text-align: center;
  }

  .sun-event label {
    display: block;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #444;
    margin-bottom: 0.4rem;
  }

  .sun-event time {
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: #b0a898;
  }

  #location {
    font-size: 0.67rem;
    color: #383838;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="time-display">
  <div id="clock">--:--:--</div>
  <div id="date"></div>
</div>

<div id="canvas-wrap">
  <canvas id="sky"></canvas>
</div>

<div id="sun-times">
  <div class="sun-event">
    <label>Sunrise</label>
    <time id="sunrise">--:--</time>
  </div>
  <div class="sun-event">
    <label>Sunset</label>
    <time id="sunset">--:--</time>
  </div>
</div>

<div id="location">Locating…</div>

<script>
// ── Solar math (NOAA algorithm) ──────────────────────────────

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function dateToJulian(date) { return date.getTime() / 86400000 + 2440587.5; }

function calcSunTimes(date, lat, lon) {
  const JD = dateToJulian(date);
  const T = (JD - 2451545.0) / 36525;
  const L0 = (280.46646 + T * (36000.76983 + T * 0.0003032)) % 360;
  const M = 357.52911 + T * (35999.05029 - 0.0001537 * T);
  const C = Math.sin(toRad(M)) * (1.914602 - T * (0.004817 + 0.000014 * T))
          + Math.sin(toRad(2 * M)) * (0.019993 - 0.000101 * T)
          + Math.sin(toRad(3 * M)) * 0.000289;
  const sunLon = L0 + C;
  const omega = 125.04 - 1934.136 * T;
  const lambda = sunLon - 0.00569 - 0.00478 * Math.sin(toRad(omega));
  const eps0 = 23 + (26 + (21.448 - T * (46.815 + T * (0.00059 - T * 0.001813))) / 60) / 60;
  const eps = eps0 + 0.00256 * Math.cos(toRad(omega));
  const sinDec = Math.sin(toRad(eps)) * Math.sin(toRad(lambda));
  const dec = toDeg(Math.asin(sinDec));
  const y = Math.tan(toRad(eps / 2)) ** 2;
  const eot = 4 * toDeg(
    y * Math.sin(2 * toRad(L0))
    - 2 * 0.016708634 * Math.sin(toRad(M))
    + 4 * 0.016708634 * y * Math.sin(toRad(M)) * Math.cos(2 * toRad(L0))
    - 0.5 * y * y * Math.sin(4 * toRad(L0))
    - 1.25 * 0.016708634 ** 2 * Math.sin(2 * toRad(M))
  );
  const cosHA = (Math.cos(toRad(90.833)) / (Math.cos(toRad(lat)) * Math.cos(toRad(dec))))
              - Math.tan(toRad(lat)) * Math.tan(toRad(dec));
  if (cosHA < -1) return { rise: null, set: null, dec, neverSets: true };
  if (cosHA > 1)  return { rise: null, set: null, dec, neverRises: true };
  const HA = toDeg(Math.acos(cosHA));
  const solarNoon = 720 - 4 * lon - eot;
  return { rise: solarNoon - 4 * HA, set: solarNoon + 4 * HA, noon: solarNoon, HA, dec };
}

function minutesToLocal(utcMin, tzOff) { return utcMin - tzOff; }

function fmtTime(m) {
  if (m == null) return '--:--';
  const mins = ((Math.round(m) % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60), mn = mins % 60;
  return `${h % 12 || 12}:${String(mn).padStart(2, '0')} ${h < 12 ? 'AM' : 'PM'}`;
}

// ── State ────────────────────────────────────────────────────

let lat = null, lon = null, sunData = null, lastDateStr = null;

function recompute(now) {
  if (lat == null) return;
  const tzOff = now.getTimezoneOffset();
  const res = calcSunTimes(now, lat, lon);
  sunData = {
    riseMin:    res.rise != null ? minutesToLocal(res.rise, tzOff) : null,
    setMin:     res.set  != null ? minutesToLocal(res.set,  tzOff) : null,
    noonMin:    res.noon != null ? minutesToLocal(res.noon, tzOff) : null,
    neverSets:  res.neverSets  || false,
    neverRises: res.neverRises || false,
  };
  document.getElementById('sunrise').textContent = fmtTime(sunData.riseMin);
  document.getElementById('sunset').textContent  = fmtTime(sunData.setMin);
}

// ── Canvas ───────────────────────────────────────────────────

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, horizonY, peakH, sideMargin, nightDepth;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.parentElement.clientWidth;
  const cssH = Math.round(cssW * 0.44);
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = cssW; H = cssH;
  horizonY   = Math.round(H * 0.70);
  peakH      = horizonY * 0.82;
  sideMargin = W * 0.085;
  nightDepth = (H - horizonY) * 0.62;
}

// ── Path geometry ────────────────────────────────────────────
// Sinusoidal arcs: half-sine above horizon (day), half-sine below (night)

function dayPt(t) {
  // t=0 → sunrise (left, on horizon), t=1 → sunset (right, on horizon)
  return {
    x: sideMargin + t * (W - 2 * sideMargin),
    y: horizonY - Math.sin(Math.PI * t) * peakH
  };
}

function nightPt(t) {
  // t=0 → sunset (right, on horizon), t=1 → next sunrise (left, on horizon)
  return {
    x: (W - sideMargin) - t * (W - 2 * sideMargin),
    y: horizonY + Math.sin(Math.PI * t) * nightDepth
  };
}

function tracePath(fn, steps) {
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const p = fn(i / steps);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
}

// ── Stars (deterministic) ────────────────────────────────────

const STARS = (() => {
  const arr = [];
  let s = 42;
  const r = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  for (let i = 0; i < 58; i++) arr.push({ rx: r(), ry: r() * 0.88, sz: r() * 0.85 + 0.2, a: r() * 0.45 + 0.35 });
  return arr;
})();

// ── Color helpers ─────────────────────────────────────────────

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function lerpHex(h1, h2, t) {
  const p = (h, o) => parseInt(h.slice(o, o + 2), 16);
  return `rgb(${Math.round(lerp(p(h1,1),p(h2,1),t))},${Math.round(lerp(p(h1,3),p(h2,3),t))},${Math.round(lerp(p(h1,5),p(h2,5),t))})`;
}

// ── Draw ──────────────────────────────────────────────────────

function drawScene(nowMin) {
  ctx.clearRect(0, 0, W, H);

  // Loading / polar night
  if (!sunData || sunData.neverRises) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#050810'); g.addColorStop(0.7, '#0a0d14'); g.addColorStop(1, '#080604');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0d0906'; ctx.fillRect(0, horizonY, W, H - horizonY);
    // Draw static stars
    for (const s of STARS) {
      ctx.beginPath(); ctx.arc(s.rx * W, s.ry * horizonY, s.sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210,215,240,${s.a * 0.7})`; ctx.fill();
    }
    ctx.beginPath(); ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke();
    if (sunData?.neverRises) {
      ctx.font = '12px system-ui'; ctx.fillStyle = '#3a3a4a';
      ctx.textAlign = 'center'; ctx.fillText('No sunrise today', W / 2, H * 0.4);
    }
    return;
  }

  // Polar day
  if (sunData.neverSets) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0b2040'); g.addColorStop(0.7, '#1a5878'); g.addColorStop(1, '#19120a');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#19120a'; ctx.fillRect(0, horizonY, W, H - horizonY);
    ctx.beginPath(); ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.font = '12px system-ui'; ctx.fillStyle = '#c8a030';
    ctx.textAlign = 'center'; ctx.fillText('Midnight sun', W / 2, H * 0.35);
    return;
  }

  const { riseMin, setMin, noonMin } = sunData;
  const dayDur   = setMin - riseMin;
  const nightDur = 1440 - dayDur;
  const isDaytime = nowMin >= riseMin && nowMin <= setMin;

  let tDay = null, tNight = null;
  if (isDaytime) {
    tDay = (nowMin - riseMin) / dayDur;
  } else if (nowMin < riseMin) {
    tNight = (nowMin + 1440 - setMin) / nightDur;
  } else {
    tNight = (nowMin - setMin) / nightDur;
  }

  // altFrac: 1=zenith, 0=horizon, negative=underground
  const altFrac = isDaytime
    ? Math.sin(Math.PI * tDay)
    : -Math.sin(Math.PI * tNight);

  // ── Sky gradient ─────────────────────────────────────────
  let skyTop, skyBot;
  const a = altFrac;
  if (a > 0.20) {
    const f = clamp((a - 0.20) / 0.35, 0, 1);
    skyTop = lerpHex('#191a2e', '#0b1e3c', f);
    skyBot = lerpHex('#283848', '#185474', f);
  } else if (a > -0.10) {
    const f = clamp((a + 0.10) / 0.30, 0, 1);
    skyTop = lerpHex('#07080f', '#191a2e', f);
    skyBot = lerpHex('#3e1608', '#283848', f);
  } else {
    skyTop = '#050810'; skyBot = '#090c12';
  }
  const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
  skyGrad.addColorStop(0, skyTop);
  skyGrad.addColorStop(1, skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, horizonY);

  // ── Ground ───────────────────────────────────────────────
  const gnd = ctx.createLinearGradient(0, horizonY, 0, H);
  gnd.addColorStop(0, isDaytime ? '#1a1208' : '#0e0a05');
  gnd.addColorStop(1, '#070504');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, horizonY, W, H - horizonY);

  // ── Stars ────────────────────────────────────────────────
  const starAlpha = clamp((-altFrac - 0.02) * 7, 0, 1);
  if (starAlpha > 0) {
    for (const s of STARS) {
      ctx.beginPath(); ctx.arc(s.rx * W, s.ry * horizonY, s.sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210,215,240,${s.a * starAlpha})`; ctx.fill();
    }
  }

  // ── Horizon glow (dawn / dusk) ───────────────────────────
  if (Math.abs(altFrac) < 0.13) {
    const strength = (1 - Math.abs(altFrac) / 0.13) ** 1.5;
    const isEastSide = nowMin < (noonMin || 720);
    const gx = isEastSide ? sideMargin : W - sideMargin;
    const hg = ctx.createRadialGradient(gx, horizonY, 0, gx, horizonY, W * 0.58);
    hg.addColorStop(0,   `rgba(255,110,25,${0.24 * strength})`);
    hg.addColorStop(0.45,`rgba(190,60,10,${0.10 * strength})`);
    hg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = hg; ctx.fillRect(0, 0, W, H);
  }

  // ── Night arc (dashed, below horizon) ───────────────────
  ctx.save();
  ctx.beginPath(); ctx.rect(0, horizonY, W, H - horizonY); ctx.clip();
  tracePath(nightPt, 80);
  ctx.setLineDash([2, 7]);
  ctx.strokeStyle = 'rgba(180,185,210,0.08)';
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // ── Day arc (above horizon) ──────────────────────────────
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, W, horizonY); ctx.clip();

  // Full track
  tracePath(dayPt, 80);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1.5; ctx.stroke();

  // Elapsed segment
  if (isDaytime && tDay > 0.004) {
    ctx.beginPath();
    for (let i = 0; i <= 80; i++) {
      const p = dayPt((i / 80) * tDay);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(255,170,30,0.52)';
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  ctx.restore();

  // ── Horizon line ─────────────────────────────────────────
  const hl = ctx.createLinearGradient(0, 0, W, 0);
  hl.addColorStop(0,    'rgba(255,255,255,0)');
  hl.addColorStop(0.12, 'rgba(255,255,255,0.11)');
  hl.addColorStop(0.88, 'rgba(255,255,255,0.11)');
  hl.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
  ctx.strokeStyle = hl; ctx.lineWidth = 1; ctx.stroke();

  // ── Sun ──────────────────────────────────────────────────
  const sunPos = isDaytime ? dayPt(tDay) : nightPt(tNight);
  const { x: sx, y: sy } = sunPos;

  if (isDaytime) {
    // Color shifts warm near horizon
    let coreFill, gc0, gc1;
    if (altFrac > 0.22) {
      coreFill = '#fff3a0';
      gc0 = 'rgba(255,215,65,0.55)'; gc1 = 'rgba(255,160,20,0)';
    } else if (altFrac > 0.05) {
      const f = (altFrac - 0.05) / 0.17;
      coreFill = lerpHex('#ffa040', '#fff3a0', f);
      gc0 = `rgba(255,${Math.round(lerp(110,215,f))},${Math.round(lerp(25,65,f))},0.62)`;
      gc1 = 'rgba(0,0,0,0)';
    } else {
      coreFill = '#ff7820';
      gc0 = 'rgba(255,85,15,0.68)'; gc1 = 'rgba(0,0,0,0)';
    }
    const grd = ctx.createRadialGradient(sx, sy, 3, sx, sy, 22);
    grd.addColorStop(0, gc0); grd.addColorStop(1, gc1);
    ctx.beginPath(); ctx.arc(sx, sy, 22, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2);
    ctx.fillStyle = coreFill; ctx.fill();
  } else {
    // Sun below horizon — show faint dot tracking underground
    const depthFrac = clamp(altFrac / -1, 0, 1); // 0=just below, 1=deepest
    const alpha = 0.15 + (1 - depthFrac) * 0.15;
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,100,130,${alpha})`; ctx.fill();
  }

  // ── Sunrise / sunset time labels ─────────────────────────
  const lY = horizonY + 13;
  ctx.font = '10px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.textAlign = 'left';
  ctx.fillText(fmtTime(riseMin), sideMargin + 3, lY);
  ctx.textAlign = 'right';
  ctx.fillText(fmtTime(setMin), W - sideMargin - 3, lY);
}

// ── Tick ──────────────────────────────────────────────────────

function tick() {
  const now = new Date();
  const dateStr = now.toDateString();
  if (dateStr !== lastDateStr) {
    lastDateStr = dateStr;
    recompute(now);
    document.getElementById('date').textContent = now.toLocaleDateString(undefined, {
      weekday: 'long', month: 'long', day: 'numeric'
    });
  }
  document.getElementById('clock').textContent = now.toLocaleTimeString(undefined, {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
  });
  const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  drawScene(nowMin);
}

// ── Geolocation ───────────────────────────────────────────────

navigator.geolocation.getCurrentPosition(
  pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    const latS = `${Math.abs(lat).toFixed(2)}° ${lat >= 0 ? 'N' : 'S'}`;
    const lonS = `${Math.abs(lon).toFixed(2)}° ${lon >= 0 ? 'E' : 'W'}`;
    document.getElementById('location').textContent = `${latS}  ${lonS}`;
    lastDateStr = null;
    tick();
  },
  () => { document.getElementById('location').textContent = 'Enable location for sun times'; },
  { enableHighAccuracy: false, timeout: 10000 }
);

// ── Bootstrap ─────────────────────────────────────────────────

resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); tick(); });
setInterval(tick, 1000);
tick();
</script>
</body>
</html>
