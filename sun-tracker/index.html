<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070710">
<title>Sun Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: #070710;
  font-family: 'Spectral', 'Source Serif Pro', Georgia, serif;
  font-feature-settings: 'tnum' 1;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

#root {
  position: relative;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
}

#sky {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  display: block;
}

/* ── Portrait overlay (default) ─────────────────────── */
#overlay-portrait {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: calc(24px + env(safe-area-inset-top)) calc(26px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(26px + env(safe-area-inset-left));
  pointer-events: none;
}

/* ── Landscape overlay (hidden by default) ──────────── */
#overlay-landscape {
  display: none;
  position: absolute;
  inset: 0;
  grid-template-rows: auto 1fr auto;
  padding: calc(36px + env(safe-area-inset-top)) calc(56px + env(safe-area-inset-right)) calc(32px + env(safe-area-inset-bottom)) calc(56px + env(safe-area-inset-left));
  pointer-events: none;
}

@media (orientation: landscape) and (min-width: 640px) {
  #overlay-portrait  { display: none; }
  #overlay-landscape { display: grid; }
}

/* ── Portrait: Top bar ───────────────────────────────── */
.hyb-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}

.hyb-clock {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  transition: color 1.2s ease;
}

.hyb-date {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  transition: color 1.2s ease;
}

/* ── Portrait: Hero ──────────────────────────────────── */
.hyb-hero {
  align-self: start;
  margin-top: 18px;
}

.hyb-hero-label {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  transition: color 1.2s ease;
}

.hyb-hero-num {
  display: flex;
  align-items: baseline;
  gap: 2px;
  line-height: 0.85;
  letter-spacing: -0.05em;
  font-weight: 500;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.hyb-hero-h, .hyb-hero-m {
  font-size: 74px;
  font-variant-numeric: tabular-nums;
  transition: color 1.2s ease;
}

.hyb-hero-unit {
  font-size: 22px;
  font-weight: 400;
  margin-right: 8px;
  transition: color 1.2s ease;
}

/* ── Portrait: Bottom stats ──────────────────────────── */
.hyb-bottom {
  align-self: end;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.hyb-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: end;
}

.hyb-row + .hyb-row {
  padding-top: 14px;
  border-top: 1px solid;
}

.hyb-cell-mid { text-align: center; }
.hyb-cell-end { text-align: right; }

.hyb-cell-label {
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  transition: color 1.2s ease;
}

.hyb-cell-val {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  margin-top: 3px;
  transition: color 1.2s ease;
}

.hyb-cell-val-sm {
  font-size: 15px;
}

/* ── Landscape: Top bar ──────────────────────────────── */
.hyw-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
}

.hyw-clock {
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  transition: color 1.2s ease;
}

.hyw-top-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hyw-phase {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  transition: color 1.2s ease;
}

.hyw-date {
  font-size: 13px;
  letter-spacing: 0.04em;
  font-weight: 400;
  transition: color 1.2s ease;
}

/* ── Landscape: Hero ─────────────────────────────────── */
.hyw-hero {
  align-self: start;
  margin-top: 32px;
  max-width: 50%;
}

.hyw-hero-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 10px;
  transition: color 1.2s ease;
}

.hyw-hero-num {
  display: flex;
  align-items: baseline;
  gap: 2px;
  line-height: 0.85;
  letter-spacing: -0.05em;
  font-weight: 500;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.hyw-hero-h, .hyw-hero-m {
  font-size: 120px;
  font-variant-numeric: tabular-nums;
  transition: color 1.2s ease;
}

.hyw-hero-unit {
  font-size: 32px;
  font-weight: 400;
  margin-right: 14px;
  transition: color 1.2s ease;
}

.hyw-hero-delta {
  margin-top: 22px;
}

.hyw-delta-head {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  transition: color 1.2s ease;
}

.hyw-delta-val {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  transition: color 1.2s ease;
}

/* ── Landscape: Bottom stats ─────────────────────────── */
.hyw-bottom {
  align-self: end;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  padding-top: 18px;
  border-top: 1px solid;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.hyw-cell {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 4px;
}

.hyw-cell-label {
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  font-weight: 500;
  transition: color 1.2s ease;
}

.hyw-cell-val {
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  transition: color 1.2s ease;
}

.hyw-cell-primary .hyw-cell-val {
  font-size: 28px;
  font-weight: 500;
}

.hyw-cell-mid { text-align: center; }
.hyw-cell-end { text-align: right; }

/* ── Location notice ─────────────────────────────────── */
#location-notice {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  padding: 6px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.4;
  transition: color 1.2s ease, opacity 0.8s ease;
  pointer-events: none;
}

/* ── Data reveal ─────────────────────────────────────── */
.data-hidden {
  opacity: 0 !important;
  transform: translateY(8px);
  pointer-events: none;
}
</style>
</head>
<body>

<div id="root">
  <canvas id="sky"></canvas>

  <!-- Portrait / mobile overlay -->
  <div id="overlay-portrait">
    <div class="hyb-top">
      <div class="hyb-clock" id="p-clock">--:--</div>
      <div class="hyb-date" id="p-date"></div>
    </div>

    <div class="hyb-hero">
      <div class="hyb-hero-label" id="p-hero-label">Daylight today</div>
      <div class="hyb-hero-num data-hidden" id="p-hero-num">
        <span class="hyb-hero-h" id="p-hero-h">--</span><span class="hyb-hero-unit" id="p-unit-h">h</span><span class="hyb-hero-m" id="p-hero-m">--</span><span class="hyb-hero-unit" id="p-unit-m">m</span>
      </div>
    </div>

    <div class="hyb-bottom data-hidden" id="p-bottom">
      <div class="hyb-row">
        <div class="hyb-cell">
          <div class="hyb-cell-label">Sunrise</div>
          <div class="hyb-cell-val" id="p-sunrise">--:--</div>
        </div>
        <div class="hyb-cell hyb-cell-mid">
          <div class="hyb-cell-label">Solar noon</div>
          <div class="hyb-cell-val" id="p-noon">--:--</div>
        </div>
        <div class="hyb-cell hyb-cell-end">
          <div class="hyb-cell-label">Sunset</div>
          <div class="hyb-cell-val" id="p-sunset">--:--</div>
        </div>
      </div>
      <div class="hyb-row" id="p-row2">
        <div class="hyb-cell">
          <div class="hyb-cell-label">Civil dawn</div>
          <div class="hyb-cell-val hyb-cell-val-sm" id="p-civil-dawn">--:--</div>
        </div>
        <div class="hyb-cell hyb-cell-mid">
          <div class="hyb-cell-label" id="p-delta-label">Time gained</div>
          <div class="hyb-cell-val hyb-cell-val-sm" id="p-delta">--</div>
        </div>
        <div class="hyb-cell hyb-cell-end">
          <div class="hyb-cell-label">Civil dusk</div>
          <div class="hyb-cell-val hyb-cell-val-sm" id="p-civil-dusk">--:--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Landscape / desktop overlay -->
  <div id="overlay-landscape">
    <div class="hyw-top">
      <div class="hyw-clock" id="l-clock">--:--</div>
      <div class="hyw-top-right">
        <div class="hyw-phase" id="l-phase"></div>
        <div class="hyw-date" id="l-date"></div>
      </div>
    </div>

    <div class="hyw-hero">
      <div class="hyw-hero-label" id="l-hero-label">Daylight today</div>
      <div class="hyw-hero-num data-hidden" id="l-hero-num">
        <span class="hyw-hero-h" id="l-hero-h">--</span><span class="hyw-hero-unit" id="l-unit-h">h</span><span class="hyw-hero-m" id="l-hero-m">--</span><span class="hyw-hero-unit" id="l-unit-m">m</span>
      </div>
      <div class="hyw-hero-delta data-hidden" id="l-delta-block">
        <div class="hyw-delta-head" id="l-delta-head">Gaining</div>
        <div class="hyw-delta-val" id="l-delta-val">--</div>
      </div>
    </div>

    <div class="hyw-bottom data-hidden" id="l-bottom">
      <div class="hyw-cell">
        <div class="hyw-cell-label">Civil dawn</div>
        <div class="hyw-cell-val" id="l-civil-dawn">--:--</div>
      </div>
      <div class="hyw-cell hyw-cell-primary">
        <div class="hyw-cell-label">Sunrise</div>
        <div class="hyw-cell-val" id="l-sunrise">--:--</div>
      </div>
      <div class="hyw-cell hyw-cell-primary hyw-cell-mid">
        <div class="hyw-cell-label">Solar noon</div>
        <div class="hyw-cell-val" id="l-noon">--:--</div>
      </div>
      <div class="hyw-cell hyw-cell-primary hyw-cell-end">
        <div class="hyw-cell-label">Sunset</div>
        <div class="hyw-cell-val" id="l-sunset">--:--</div>
      </div>
      <div class="hyw-cell hyw-cell-end">
        <div class="hyw-cell-label">Civil dusk</div>
        <div class="hyw-cell-val" id="l-civil-dusk">--:--</div>
      </div>
    </div>
  </div>

  <div id="location-notice"></div>
</div>

<script>
// ── Solar math (NOAA-derived) ────────────────────────────────────────
const PI = Math.PI;
const toRad = d => d * PI / 180;
const toDeg = r => r * 180 / PI;
const dateToJulian = d => d.getTime() / 86400000 + 2440587.5;

function solarPosition(date) {
  const JD = dateToJulian(date);
  const T = (JD - 2451545.0) / 36525;
  const L0 = (280.46646 + T * (36000.76983 + T * 0.0003032)) % 360;
  const M = 357.52911 + T * (35999.05029 - 0.0001537 * T);
  const C = Math.sin(toRad(M)) * (1.914602 - T * (0.004817 + 0.000014 * T))
          + Math.sin(toRad(2 * M)) * (0.019993 - 0.000101 * T)
          + Math.sin(toRad(3 * M)) * 0.000289;
  const sunLon = L0 + C;
  const omega = 125.04 - 1934.136 * T;
  const lambda = sunLon - 0.00569 - 0.00478 * Math.sin(toRad(omega));
  const eps0 = 23 + (26 + (21.448 - T * (46.815 + T * (0.00059 - T * 0.001813))) / 60) / 60;
  const eps = eps0 + 0.00256 * Math.cos(toRad(omega));
  const sinDec = Math.sin(toRad(eps)) * Math.sin(toRad(lambda));
  const dec = toDeg(Math.asin(sinDec));
  const y = Math.tan(toRad(eps / 2)) ** 2;
  const eot = 4 * toDeg(
    y * Math.sin(2 * toRad(L0))
    - 2 * 0.016708634 * Math.sin(toRad(M))
    + 4 * 0.016708634 * y * Math.sin(toRad(M)) * Math.cos(2 * toRad(L0))
    - 0.5 * y * y * Math.sin(4 * toRad(L0))
    - 1.25 * 0.016708634 ** 2 * Math.sin(2 * toRad(M))
  );
  return { dec, eot, L0 };
}

function eventsForAltitude(date, lat, lon, tzOffMin, altDeg) {
  const { dec, eot } = solarPosition(date);
  const cosHA = (Math.cos(toRad(altDeg)) / (Math.cos(toRad(lat)) * Math.cos(toRad(dec))))
              - Math.tan(toRad(lat)) * Math.tan(toRad(dec));
  if (cosHA < -1) return { rise: null, set: null, noon: null, neverSets: true };
  if (cosHA >  1) return { rise: null, set: null, noon: null, neverRises: true };
  const HA = toDeg(Math.acos(cosHA));
  const noonUtc = 720 - 4 * lon - eot;
  return {
    rise: noonUtc - 4 * HA - tzOffMin,
    set:  noonUtc + 4 * HA - tzOffMin,
    noon: noonUtc - tzOffMin,
    dec
  };
}

function dailyAlmanac(date, lat, lon) {
  const tzOffMin = date.getTimezoneOffset();
  const day        = eventsForAltitude(date, lat, lon, tzOffMin, 90.833);
  const civil      = eventsForAltitude(date, lat, lon, tzOffMin, 96);
  const nautical   = eventsForAltitude(date, lat, lon, tzOffMin, 102);
  const astronomic = eventsForAltitude(date, lat, lon, tzOffMin, 108);
  return {
    sunrise:    day.rise,
    sunset:     day.set,
    solarNoon:  day.noon,
    civilDawn:  civil.rise,
    civilDusk:  civil.set,
    nautDawn:   nautical.rise,
    nautDusk:   nautical.set,
    astroDawn:  astronomic.rise,
    astroDusk:  astronomic.set,
    neverRises: day.neverRises || false,
    neverSets:  day.neverSets  || false,
    dec:        day.dec,
  };
}

function altitudeAt(date, lat, lon) {
  const { dec, eot } = solarPosition(date);
  const nowUtcMin = date.getUTCHours() * 60 + date.getUTCMinutes() + date.getUTCSeconds() / 60;
  const solarTime = nowUtcMin + 4 * lon + eot;
  const HA = (solarTime - 720) / 4;
  const alt = toDeg(Math.asin(
    Math.sin(toRad(lat)) * Math.sin(toRad(dec))
    + Math.cos(toRad(lat)) * Math.cos(toRad(dec)) * Math.cos(toRad(HA))
  ));
  const az = toDeg(Math.atan2(
    Math.sin(toRad(HA)),
    Math.cos(toRad(HA)) * Math.sin(toRad(lat)) - Math.tan(toRad(dec)) * Math.cos(toRad(lat))
  ));
  return { alt, az: (az + 180) % 360, dec, HA };
}

function daylightMinutes(alm) {
  if (!alm) return null;
  if (alm.neverSets)  return 1440;
  if (alm.neverRises) return 0;
  if (alm.sunrise == null || alm.sunset == null) return null;
  return alm.sunset - alm.sunrise;
}

function dayOverDayDelta(today, yesterday) {
  const t = daylightMinutes(today);
  const y = daylightMinutes(yesterday);
  if (t == null || y == null) return null;
  return t - y;
}

function fmtClock(m) {
  if (m == null || !isFinite(m)) return '--:--';
  const mins = ((Math.round(m) % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60), mn = mins % 60;
  const ampm = h < 12 ? 'AM' : 'PM';
  return `${h % 12 || 12}:${String(mn).padStart(2, '0')} ${ampm}`;
}

function fmtClock24(m) {
  if (m == null || !isFinite(m)) return '--:--';
  const mins = ((Math.round(m) % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60), mn = mins % 60;
  return `${String(h).padStart(2, '0')}:${String(mn).padStart(2, '0')}`;
}

function fmtDuration(mins) {
  if (mins == null || !isFinite(mins)) return '--';
  const m = Math.abs(mins);
  const h = Math.floor(m / 60), mn = Math.round(m % 60);
  if (h === 0) return `${mn}m`;
  return `${h}h ${String(mn).padStart(2,'0')}m`;
}

function fmtDelta(mins) {
  if (mins == null || !isFinite(mins)) return '--';
  const sign = mins >= 0 ? '+' : '−';
  const m = Math.abs(mins);
  const wholeM = Math.floor(m);
  const sec = Math.round((m - wholeM) * 60);
  return `${sign}${wholeM}m ${String(sec).padStart(2,'0')}s`;
}

function phaseLabel(alt, isAfterNoon) {
  if (alt > 50)  return 'High noon';
  if (alt > 12)  return isAfterNoon ? 'Afternoon' : 'Morning';
  if (alt > 0)   return isAfterNoon ? 'Late afternoon' : 'Early morning';
  if (alt > -6)  return isAfterNoon ? 'Civil dusk' : 'Civil dawn';
  if (alt > -12) return isAfterNoon ? 'Nautical dusk' : 'Nautical dawn';
  if (alt > -18) return isAfterNoon ? 'Astronomical dusk' : 'Astronomical dawn';
  return 'Night';
}

// ── Reactive palette ─────────────────────────────────────────────────
function lerpHex(h1, h2, t) {
  const p = (h, o) => parseInt(h.slice(o, o + 2), 16);
  const r = Math.round(p(h1,1) + (p(h2,1) - p(h1,1)) * t);
  const g = Math.round(p(h1,3) + (p(h2,3) - p(h1,3)) * t);
  const b = Math.round(p(h1,5) + (p(h2,5) - p(h1,5)) * t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function paletteForAltitude(alt) {
  const stops = [
    { a: -90,  p: { bg:'#070710', sky:'#0a0c16', horizon:'#101426', ink:'#cdd0e0', dim:'#52576b', accent:'#5b6f9c' } },
    { a: -18,  p: { bg:'#0b0d18', sky:'#13182a', horizon:'#1a2138', ink:'#d4d8e6', dim:'#5e6378', accent:'#7a8fbf' } },
    { a: -12,  p: { bg:'#161628', sky:'#1f2540', horizon:'#2c3658', ink:'#dfe1ec', dim:'#6c7186', accent:'#9eb0d8' } },
    { a:  -6,  p: { bg:'#2a2236', sky:'#3a324e', horizon:'#603d4e', ink:'#ece7df', dim:'#86798a', accent:'#e08a6a' } },
    { a: -0.5, p: { bg:'#5a3a32', sky:'#85513a', horizon:'#c4753a', ink:'#fff3e2', dim:'#a08474', accent:'#ff8e3c' } },
    { a:   6,  p: { bg:'#c08254', sky:'#e8a574', horizon:'#ffc88a', ink:'#3a2418', dim:'#7a513a', accent:'#ff7a2a' } },
    { a:  20,  p: { bg:'#dcc4a0', sky:'#a7c8e3', horizon:'#e3d6b9', ink:'#1d1a14', dim:'#6a6356', accent:'#d97a2a' } },
    { a:  45,  p: { bg:'#e8e2d2', sky:'#7eb4dc', horizon:'#ddd6c4', ink:'#15140f', dim:'#5e5848', accent:'#c66a1f' } },
    { a:  60,  p: { bg:'#e9e3d2', sky:'#5fa3d2', horizon:'#dfd8c6', ink:'#13120e', dim:'#5a5444', accent:'#b85e18' } },
  ];
  if (alt <= stops[0].a) return { ...stops[0].p, alt };
  if (alt >= stops[stops.length-1].a) return { ...stops[stops.length-1].p, alt };
  for (let i = 0; i < stops.length - 1; i++) {
    if (alt >= stops[i].a && alt <= stops[i+1].a) {
      const lo = stops[i], hi = stops[i+1];
      const t = (alt - lo.a) / (hi.a - lo.a);
      return {
        bg:      lerpHex(lo.p.bg,      hi.p.bg,      t),
        sky:     lerpHex(lo.p.sky,     hi.p.sky,     t),
        horizon: lerpHex(lo.p.horizon, hi.p.horizon, t),
        ink:     lerpHex(lo.p.ink,     hi.p.ink,     t),
        dim:     lerpHex(lo.p.dim,     hi.p.dim,     t),
        accent:  lerpHex(lo.p.accent,  hi.p.accent,  t),
        alt
      };
    }
  }
  return { ...stops[stops.length-1].p, alt };
}

function isHexDark(hex) {
  if (!hex || hex[0] !== '#') return true;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 < 140;
}

// ── Canvas helpers ────────────────────────────────────────────────────
function hexA(hex, a) {
  if (!hex || hex[0] !== '#') return `rgba(100,100,100,${a})`;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function darken(hex, amt) {
  const r = Math.max(0, Math.round(parseInt(hex.slice(1,3),16) * (1 - amt)));
  const g = Math.max(0, Math.round(parseInt(hex.slice(3,5),16) * (1 - amt)));
  const b = Math.max(0, Math.round(parseInt(hex.slice(5,7),16) * (1 - amt)));
  return `rgb(${r},${g},${b})`;
}

function mixColor(h1, h2, t) {
  const r = Math.round(parseInt(h1.slice(1,3),16) + (parseInt(h2.slice(1,3),16) - parseInt(h1.slice(1,3),16)) * t);
  const g = Math.round(parseInt(h1.slice(3,5),16) + (parseInt(h2.slice(3,5),16) - parseInt(h1.slice(3,5),16)) * t);
  const b = Math.round(parseInt(h1.slice(5,7),16) + (parseInt(h2.slice(5,7),16) - parseInt(h1.slice(5,7),16)) * t);
  return `rgb(${r},${g},${b})`;
}

// ── 24h arc point ─────────────────────────────────────────────────────
function hybridArcPoint(minOfDay, W, horizonY, peakH, sunriseMin, sunsetMin, solarNoonMin) {
  const x = (minOfDay / 1440) * W;
  const daylight = (sunsetMin - sunriseMin) / 60;
  const horizonCos = Math.cos(Math.PI * daylight / 24);
  const phi = ((minOfDay - solarNoonMin) / 720) * Math.PI;
  const raw = Math.cos(phi) - horizonCos;
  const peakRaw = 1 - horizonCos;
  const scale = peakH / Math.max(peakRaw, 0.01);
  const y = horizonY - raw * scale;
  return { x, y, alt: raw };
}

// ── Draw scene ────────────────────────────────────────────────────────
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

function drawScene(W, H, palette, today, nowMin, pos) {
  const dpr = window.devicePixelRatio || 1;
  if (canvas.width !== Math.round(W * dpr) || canvas.height !== Math.round(H * dpr)) {
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  ctx.clearRect(0, 0, W, H);

  const p = palette || { bg:'#070710', sky:'#0a0c16', horizon:'#101426', ink:'#cdd0e0', dim:'#52576b', accent:'#5b6f9c' };
  const t = today || {};

  const horizonY   = H * 0.62;
  const topPadding = H * 0.42;
  const peakH      = horizonY - topPadding;

  // Sky-to-ground gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, p.sky);
  skyGrad.addColorStop((horizonY / H) * 0.92, p.horizon);
  skyGrad.addColorStop(horizonY / H, mixColor(p.horizon, p.bg, 0.35));
  skyGrad.addColorStop((horizonY / H) + 0.0001, darken(p.bg, 0.08));
  skyGrad.addColorStop(1, darken(p.bg, 0.32));
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Horizon haze
  const accent = p.accent || '#5b6f9c';
  const sunAlt = pos ? pos.alt : -90;
  const haze = ctx.createLinearGradient(0, horizonY - H * 0.08, 0, horizonY + H * 0.02);
  haze.addColorStop(0, 'rgba(255,255,255,0)');
  haze.addColorStop(0.75, hexA(accent, Math.abs(sunAlt) < 10 ? 0.18 : 0.08));
  haze.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, horizonY - H * 0.08, W, H * 0.10);

  const sunriseMin   = t.sunrise   != null ? t.sunrise   : 360;
  const sunsetMin    = t.sunset    != null ? t.sunset    : 1080;
  const solarNoonMin = t.solarNoon != null ? t.solarNoon : 720;

  // Horizon line
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY); ctx.stroke();

  // 24h sun curve
  ctx.strokeStyle = hexA(accent, 0.55);
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i <= 240; i++) {
    const m = (i / 240) * 1440;
    const pt = hybridArcPoint(m, W, horizonY, peakH, sunriseMin, sunsetMin, solarNoonMin);
    i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
  }
  ctx.stroke();

  // Sunrise / sunset tick markers
  for (const m of [sunriseMin, sunsetMin]) {
    const pt = hybridArcPoint(m, W, horizonY, peakH, sunriseMin, sunsetMin, solarNoonMin);
    ctx.strokeStyle = hexA(accent, 0.7);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pt.x, horizonY - 5); ctx.lineTo(pt.x, horizonY + 5); ctx.stroke();
  }

  // Sun glyph — Solid disc (no glow/halo)
  const sunPt = hybridArcPoint(nowMin, W, horizonY, peakH, sunriseMin, sunsetMin, solarNoonMin);
  const aboveHorizon = sunPt.alt >= 0;
  const radius = aboveHorizon ? 16 : 10;
  ctx.fillStyle = aboveHorizon ? accent : hexA(accent, 0.55);
  ctx.beginPath(); ctx.arc(sunPt.x, sunPt.y, radius, 0, Math.PI * 2); ctx.fill();
  if (!aboveHorizon) {
    ctx.strokeStyle = hexA('#ffffff', 0.35);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(sunPt.x, sunPt.y, radius + 3, 0, Math.PI * 2); ctx.stroke();
  }

  // Stars when dark enough
  if (sunAlt < -8) {
    let s = 13;
    const rng = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
    for (let i = 0; i < 70; i++) {
      const sx = rng() * W;
      const sy = rng() * horizonY * 0.95;
      const sz = rng() * 0.9 + 0.3;
      const sa = rng() * 0.5 + 0.25;
      ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,240,255,${sa})`; ctx.fill();
    }
  }
}

// ── Apply palette to UI ───────────────────────────────────────────────
function applyPalette(palette) {
  const p = palette || {};
  const bgDark = isHexDark(p.bg || '#070710');
  const fg     = bgDark ? '#f6efe0' : (p.ink || '#15140e');
  const fgDim  = bgDark ? 'rgba(246,239,224,0.55)' : 'rgba(21,20,14,0.55)';
  const ruleC  = bgDark ? 'rgba(246,239,224,0.18)' : 'rgba(21,20,14,0.18)';
  const accent = p.accent || '#5b6f9c';
  const unitC  = `color-mix(in srgb, ${fg} 58%, transparent)`;

  // Portrait
  document.getElementById('p-clock').style.color      = accent;
  document.getElementById('p-date').style.color       = fgDim;
  document.getElementById('p-hero-label').style.color = fgDim;
  for (const el of document.querySelectorAll('.hyb-hero-h, .hyb-hero-m')) el.style.color = fg;
  for (const el of document.querySelectorAll('.hyb-hero-unit')) el.style.color = unitC;
  for (const el of document.querySelectorAll('.hyb-cell-label')) el.style.color = fgDim;
  for (const el of document.querySelectorAll('.hyb-cell-val'))   el.style.color = accent;
  document.getElementById('p-row2').style.borderColor = ruleC;

  // Landscape
  document.getElementById('l-clock').style.color       = accent;
  document.getElementById('l-phase').style.color       = fgDim;
  document.getElementById('l-date').style.color        = fgDim;
  document.getElementById('l-hero-label').style.color  = fgDim;
  for (const el of document.querySelectorAll('.hyw-hero-h, .hyw-hero-m')) el.style.color = fg;
  for (const el of document.querySelectorAll('.hyw-hero-unit')) el.style.color = unitC;
  document.getElementById('l-delta-head').style.color  = fgDim;
  document.getElementById('l-delta-val').style.color   = accent;
  for (const el of document.querySelectorAll('.hyw-cell-label')) el.style.color = fgDim;
  for (const el of document.querySelectorAll('.hyw-cell-val'))   el.style.color = accent;
  document.getElementById('l-bottom').style.borderColor = ruleC;

  document.getElementById('location-notice').style.color = fg;

  // Full bleed: tint the OS chrome to match the gradient edges so the
  // background extends behind the status bar and Safari toolbar.
  // Top status bar follows the sky color; bottom toolbar follows the ground.
  const skyTop    = p.sky || '#0a0c16';
  const groundEnd = darken(p.bg || '#070710', 0.32);
  // html background = top safe-area (status bar); body background = bottom safe-area (Safari toolbar)
  document.documentElement.style.background = skyTop;
  document.body.style.background = groundEnd;
  const themeMeta = document.querySelector('meta[name="theme-color"]');
  if (themeMeta) themeMeta.setAttribute('content', skyTop);
}

// ── State ─────────────────────────────────────────────────────────────
let lat = null, lon = null;
let today = null, yesterday = null;
let pos = null;
let palette = null;
let lastDateStr = null;

function recompute(now) {
  if (lat == null) return;
  today     = dailyAlmanac(now, lat, lon);
  const yest = new Date(now.getTime() - 86400000);
  yesterday = dailyAlmanac(yest, lat, lon);
}

function updateUI(now) {
  if (lat == null) return;

  pos     = altitudeAt(now, lat, lon);
  palette = paletteForAltitude(pos.alt);

  const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const W = window.innerWidth, H = window.innerHeight;
  drawScene(W, H, palette, today, nowMin, pos);
  applyPalette(palette);

  const clockStr = fmtClock24(nowMin);
  document.getElementById('p-clock').textContent = clockStr;
  document.getElementById('l-clock').textContent = clockStr;

  if (now.toDateString() !== lastDateStr) {
    lastDateStr = now.toDateString();
    recompute(now);
    const dateStr = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('p-date').textContent = dateStr;
    document.getElementById('l-date').textContent = dateStr;
  }

  const phase = phaseLabel(pos.alt, nowMin > (today && today.solarNoon != null ? today.solarNoon : 720));
  document.getElementById('l-phase').textContent = phase;

  if (!today) return;
  const t = today;

  const dl = daylightMinutes(t);
  const dh = dl != null ? Math.floor(dl / 60) : '--';
  const dm = dl != null ? String(Math.round(dl % 60)).padStart(2, '0') : '--';
  document.getElementById('p-hero-h').textContent = dh;
  document.getElementById('p-hero-m').textContent = dm;
  document.getElementById('l-hero-h').textContent = dh;
  document.getElementById('l-hero-m').textContent = dm;

  // Portrait primary row
  document.getElementById('p-sunrise').textContent = fmtClock(t.sunrise);
  document.getElementById('p-noon').textContent    = fmtClock(t.solarNoon);
  document.getElementById('p-sunset').textContent  = fmtClock(t.sunset);

  // Portrait secondary row
  document.getElementById('p-civil-dawn').textContent = fmtClock(t.civilDawn);
  document.getElementById('p-civil-dusk').textContent = fmtClock(t.civilDusk);
  const delta = dayOverDayDelta(t, yesterday);
  document.getElementById('p-delta-label').textContent = (delta != null && delta < 0) ? 'Time lost' : 'Time gained';
  document.getElementById('p-delta').textContent = delta != null ? fmtDelta(delta) : '--';

  // Landscape bottom
  document.getElementById('l-civil-dawn').textContent = fmtClock(t.civilDawn);
  document.getElementById('l-sunrise').textContent    = fmtClock(t.sunrise);
  document.getElementById('l-noon').textContent       = fmtClock(t.solarNoon);
  document.getElementById('l-sunset').textContent     = fmtClock(t.sunset);
  document.getElementById('l-civil-dusk').textContent = fmtClock(t.civilDusk);

  // Landscape delta block
  if (delta != null) {
    document.getElementById('l-delta-head').textContent = delta >= 0 ? 'Gaining' : 'Losing';
    document.getElementById('l-delta-val').textContent  = fmtDuration(Math.abs(delta));
  }
}

// ── Data reveal ───────────────────────────────────────────────────────
let dataRevealed = false;

function revealData() {
  requestAnimationFrame(() => {
    for (const id of ['p-hero-num', 'p-bottom', 'l-hero-num', 'l-delta-block', 'l-bottom']) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('data-hidden');
    }
  });
}

// ── Tick ──────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  if (lat == null) {
    const W = window.innerWidth, H = window.innerHeight;
    drawScene(W, H, null, null, 0, null);
    const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
    const clockStr = fmtClock24(nowMin);
    document.getElementById('p-clock').textContent = clockStr;
    document.getElementById('l-clock').textContent = clockStr;
    const dateStr = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('p-date').textContent = dateStr;
    document.getElementById('l-date').textContent = dateStr;
    return;
  }
  if (!dataRevealed) {
    dataRevealed = true;
    revealData();
  }
  updateUI(now);
}

// ── Geolocation ───────────────────────────────────────────────────────
navigator.geolocation.getCurrentPosition(
  p => {
    lat = p.coords.latitude;
    lon = p.coords.longitude;
    const latS = `${Math.abs(lat).toFixed(2)}°${lat >= 0 ? 'N' : 'S'}`;
    const lonS = `${Math.abs(lon).toFixed(2)}°${lon >= 0 ? 'E' : 'W'}`;
    document.getElementById('location-notice').textContent = `${latS}  ${lonS}`;
    lastDateStr = null;
    tick();
  },
  () => {
    lat = 37.77; lon = -122.42;
    document.getElementById('location-notice').textContent = 'Location unavailable — showing San Francisco';
    lastDateStr = null;
    tick();
  },
  { enableHighAccuracy: false, timeout: 10000 }
);

window.addEventListener('resize', tick);
setInterval(tick, 1000);
tick();
</script>
