<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a12;
    color: #e8e0d0;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 2rem;
    padding: 2rem;
  }

  #arc-container {
    position: relative;
    width: 320px;
    height: 180px;
  }

  canvas {
    display: block;
  }

  #time-display {
    text-align: center;
  }

  #clock {
    font-size: 3rem;
    font-weight: 200;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  #date {
    font-size: 0.9rem;
    color: #888;
    margin-top: 0.25rem;
  }

  #sun-times {
    display: flex;
    gap: 3rem;
    text-align: center;
  }

  .sun-event label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #666;
    margin-bottom: 0.35rem;
  }

  .sun-event time {
    font-size: 1.4rem;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  #location {
    font-size: 0.75rem;
    color: #555;
    text-align: center;
  }

  #status {
    font-size: 0.85rem;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body>

<div id="time-display">
  <div id="clock">--:--:--</div>
  <div id="date"></div>
</div>

<div id="arc-container">
  <canvas id="arc" width="320" height="180"></canvas>
</div>

<div id="sun-times">
  <div class="sun-event">
    <label>Sunrise</label>
    <time id="sunrise">--:--</time>
  </div>
  <div class="sun-event">
    <label>Sunset</label>
    <time id="sunset">--:--</time>
  </div>
</div>

<div id="location">Locating…</div>

<script>
// Solar calculation based on NOAA algorithm
// All angles in degrees unless noted

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function calcSunTimes(date, lat, lon) {
  const JD = dateToJulian(date);
  const T = (JD - 2451545.0) / 36525;

  // Geometric mean longitude (degrees)
  const L0 = (280.46646 + T * (36000.76983 + T * 0.0003032)) % 360;
  // Mean anomaly (degrees)
  const M = 357.52911 + T * (35999.05029 - 0.0001537 * T);
  // Equation of center
  const C = Math.sin(toRad(M)) * (1.914602 - T * (0.004817 + 0.000014 * T))
          + Math.sin(toRad(2 * M)) * (0.019993 - 0.000101 * T)
          + Math.sin(toRad(3 * M)) * 0.000289;
  // Sun's true longitude
  const sunLon = L0 + C;
  // Apparent longitude
  const omega = 125.04 - 1934.136 * T;
  const lambda = sunLon - 0.00569 - 0.00478 * Math.sin(toRad(omega));
  // Obliquity of ecliptic
  const eps0 = 23 + (26 + (21.448 - T * (46.8150 + T * (0.00059 - T * 0.001813))) / 60) / 60;
  const eps = eps0 + 0.00256 * Math.cos(toRad(omega));
  // Declination
  const sinDec = Math.sin(toRad(eps)) * Math.sin(toRad(lambda));
  const dec = toDeg(Math.asin(sinDec));
  // Equation of time (minutes)
  const y = Math.tan(toRad(eps / 2)) ** 2;
  const eot = 4 * toDeg(
    y * Math.sin(2 * toRad(L0))
    - 2 * 0.016708634 * Math.sin(toRad(M))
    + 4 * 0.016708634 * y * Math.sin(toRad(M)) * Math.cos(2 * toRad(L0))
    - 0.5 * y * y * Math.sin(4 * toRad(L0))
    - 1.25 * 0.016708634 ** 2 * Math.sin(2 * toRad(M))
  );

  // Hour angle for sunrise/sunset (degrees)
  const cosHA = (Math.cos(toRad(90.833)) / (Math.cos(toRad(lat)) * Math.cos(toRad(dec))))
              - Math.tan(toRad(lat)) * Math.tan(toRad(dec));

  if (cosHA < -1) return { rise: null, set: null, dec, neverSets: true };
  if (cosHA > 1)  return { rise: null, set: null, dec, neverRises: true };

  const HA = toDeg(Math.acos(cosHA));

  // Solar noon in minutes from midnight UTC
  const solarNoon = 720 - 4 * lon - eot;
  const sunriseUTC = solarNoon - 4 * HA; // minutes from midnight UTC
  const sunsetUTC  = solarNoon + 4 * HA;

  return { rise: sunriseUTC, set: sunsetUTC, noon: solarNoon, HA, dec };
}

function dateToJulian(date) {
  return date.getTime() / 86400000 + 2440587.5;
}

function minutesToLocal(utcMinutes, tzOffset) {
  // tzOffset is in minutes, from date.getTimezoneOffset() (negative = east)
  return utcMinutes - tzOffset;
}

function fmtTime(totalMinutes) {
  if (totalMinutes == null) return '--:--';
  const mins = ((Math.round(totalMinutes) % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

// State
let lat = null, lon = null;
let sunData = null;
let lastDateStr = null;

function recompute(now) {
  if (lat == null) return;
  const tzOff = now.getTimezoneOffset(); // minutes behind UTC
  const res = calcSunTimes(now, lat, lon);
  sunData = {
    riseMin: res.rise != null ? minutesToLocal(res.rise, tzOff) : null,
    setMin:  res.set  != null ? minutesToLocal(res.set,  tzOff) : null,
    noonMin: res.noon != null ? minutesToLocal(res.noon, tzOff) : null,
    neverSets: res.neverSets || false,
    neverRises: res.neverRises || false,
  };
  document.getElementById('sunrise').textContent = fmtTime(sunData.riseMin);
  document.getElementById('sunset').textContent  = fmtTime(sunData.setMin);
}

// Arc drawing
const canvas = document.getElementById('arc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H + 10; // center below canvas bottom for a nice arc
const R = H + 10;

function drawArc(nowMinutes) {
  ctx.clearRect(0, 0, W, H);

  // Background horizon line
  ctx.beginPath();
  ctx.moveTo(0, H - 10);
  ctx.lineTo(W, H - 10);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.stroke();

  if (!sunData || sunData.neverRises) {
    drawLabel('No sunrise today', W / 2, H / 2, '#555');
    return;
  }
  if (sunData.neverSets) {
    drawLabel('Sun never sets today', W / 2, H / 2, '#f0a020');
    // still draw sun at current position
  }

  const { riseMin, setMin, noonMin } = sunData;

  // Map minute-of-day → arc angle
  // Sunrise = leftmost point (π), sunset = rightmost (0), measured from center below canvas
  function minToAngle(min) {
    const t = (min - riseMin) / (setMin - riseMin); // 0 at rise, 1 at set
    return Math.PI - t * Math.PI; // π → 0
  }

  // Draw the day arc (track)
  ctx.beginPath();
  ctx.arc(cx, cy, R, Math.PI, 0, false);
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Progress arc (elapsed portion of day)
  const isDaytime = nowMinutes >= riseMin && nowMinutes <= setMin;
  const progressEnd = isDaytime ? minToAngle(nowMinutes) : (nowMinutes < riseMin ? Math.PI : 0);

  if (progressEnd < Math.PI) {
    ctx.beginPath();
    ctx.arc(cx, cy, R, Math.PI, progressEnd, false);
    ctx.strokeStyle = '#f0a020';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Draw sun dot
  let sunAngle;
  if (isDaytime) {
    sunAngle = minToAngle(nowMinutes);
  } else {
    // below horizon — clamp for visual
    sunAngle = nowMinutes < riseMin ? Math.PI : 0;
  }

  const sunX = cx + R * Math.cos(Math.PI + sunAngle); // arc goes left→right so flip
  // Actually let's compute correctly:
  // arc(cx, cy, R, startAngle, endAngle) where startAngle=π is left, 0 is right
  // point at angle θ from center: x = cx + R*cos(θ), y = cy + R*sin(θ)
  // at π: x = cx - R (left), at 0: x = cx + R (right)
  const sunAng2 = isDaytime ? minToAngle(nowMinutes) : (nowMinutes < riseMin ? Math.PI : 0);
  const sx = cx + R * Math.cos(sunAng2);
  const sy = cy + R * Math.sin(sunAng2);

  // Glow
  const grd = ctx.createRadialGradient(sx, sy, 1, sx, sy, 14);
  grd.addColorStop(0, isDaytime ? 'rgba(255,200,60,0.5)' : 'rgba(100,100,120,0.3)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(sx, sy, 14, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Sun circle
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fillStyle = isDaytime ? '#ffce3d' : '#444';
  ctx.fill();

  // Sunrise / sunset tick labels
  drawLabel(fmtTime(riseMin), 12, H - 14, '#666', 'left');
  drawLabel(fmtTime(setMin),  W - 12, H - 14, '#666', 'right');

  // Noon marker
  if (noonMin != null) {
    const noonAng = minToAngle(noonMin);
    const nx = cx + R * Math.cos(noonAng);
    const ny = cy + R * Math.sin(noonAng);
    if (ny < H - 10) {
      ctx.beginPath();
      ctx.moveTo(nx, ny - 6);
      ctx.lineTo(nx, ny + 6);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

function drawLabel(text, x, y, color, align = 'center') {
  ctx.font = '11px system-ui, sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
}

function tick() {
  const now = new Date();
  const dateStr = now.toDateString();

  // Recompute solar data when date changes
  if (dateStr !== lastDateStr) {
    lastDateStr = dateStr;
    recompute(now);
    document.getElementById('date').textContent = now.toLocaleDateString(undefined, {
      weekday: 'long', month: 'long', day: 'numeric'
    });
  }

  // Clock
  document.getElementById('clock').textContent = now.toLocaleTimeString(undefined, {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
  });

  // Current minute of day (local)
  const nowMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  drawArc(nowMinutes);
}

// Geolocation
navigator.geolocation.getCurrentPosition(
  pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    const latStr = Math.abs(lat).toFixed(2) + '° ' + (lat >= 0 ? 'N' : 'S');
    const lonStr = Math.abs(lon).toFixed(2) + '° ' + (lon >= 0 ? 'E' : 'W');
    document.getElementById('location').textContent = `${latStr}, ${lonStr}`;
    lastDateStr = null; // force recompute
    tick();
  },
  err => {
    document.getElementById('location').textContent = 'Location unavailable — enable location access';
  },
  { enableHighAccuracy: false, timeout: 10000 }
);

// Start clock immediately, will draw placeholder until location arrives
setInterval(tick, 1000);
tick();
</script>
</body>
</html>
