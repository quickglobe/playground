<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Game of Life</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #1a1a2e;
    --toolbar-bg:  #16213e;
    --border:      #0f3460;
    --accent:      #e94560;
    --btn-bg:      #0f3460;
    --text:        #e0e0e0;
    --muted:       #a0a0c0;
    --badge-bg:    #2a2a4e;
    --range-track: #0f3460;
  }

  [data-theme="light"] {
    --bg:          #f0f4ff;
    --toolbar-bg:  #e4e8f8;
    --border:      #c5cae9;
    --accent:      #e94560;
    --btn-bg:      #e4e8f8;
    --text:        #1a1a2e;
    --muted:       #5060a0;
    --badge-bg:    #d5d8f0;
    --range-track: #c5cae9;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
  }

  #toolbar {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 12px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #toolbar-top,
  #toolbar-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #toolbar h1 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .sep { flex: 1; }

  button {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 0 14px;
    height: 40px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  @media (hover: hover) {
    button:hover { background: var(--accent); color: #fff; }
  }
  button:active { opacity: 0.8; }
  button.tap-flash { background: var(--accent); color: #fff; }

  #btn-play {
    min-width: 76px;
    text-align: center;
  }

  #btn-theme {
    border-color: var(--border);
    padding: 0 10px;
  }

  #speed-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    flex: 1;
    min-width: 0;
  }

  #speed-val {
    white-space: nowrap;
    color: var(--muted);
    min-width: 38px;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    min-width: 50px;
    max-width: 140px;
    height: 4px;
    border-radius: 2px;
    background: var(--range-track);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  #gen-counter {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Stage fills the leftover space and centres the box; its padding is the
     gap between the box and the window edge. */
  #stage {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }

  /* The box is sized by JS to an exact integer number of cells, so the grid
     never overflows it (no clipped cells) and never falls short of it (no gap). */
  #canvas-wrap {
    overflow: hidden;
    position: relative;
    touch-action: none;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  canvas {
    display: block;
    cursor: crosshair;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div id="toolbar-top">
    <h1>Game of Life</h1>
    <span class="sep"></span>
    <span id="gen-counter">Gen 0</span>
    <button id="btn-theme" title="Toggle light/dark mode">Light</button>
  </div>
  <div id="toolbar-bottom">
    <button id="btn-play">Play</button>
    <div id="speed-group">
      <input type="range" id="speed-slider" min="1" max="30" value="10">
      <span id="speed-val">10 fps</span>
    </div>
    <span class="sep"></span>
    <button id="btn-random">Random</button>
    <button id="btn-clear">Clear</button>
  </div>
</div>

<div id="stage">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
const CELL = 14;
const STAGE_PAD = 16;   // must match #stage padding
const BOX_BORDER = 1;   // must match #canvas-wrap border width
const MIN_CELLS = 8;
const DEAD = 0, ALIVE = 1;

const THEMES = {
  dark: {
    bg:        '#1a1a2e',
    cell:      '#e94560',
    grid:      'rgba(15,52,96,0.6)',
  },
  light: {
    bg:        '#f0f4ff',
    cell:      '#e94560',
    grid:      'rgba(150,165,220,0.5)',
  },
};

const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
let currentTheme = systemDark.matches ? 'dark' : 'light';

function applyTheme(theme) {
  currentTheme = theme;
  document.body.dataset.theme = theme === 'light' ? 'light' : '';
  document.getElementById('btn-theme').textContent = theme === 'dark' ? 'Light' : 'Dark';
}

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

systemDark.addEventListener('change', e => applyTheme(e.matches ? 'dark' : 'light'));

let cols, rows;
let grid, nextGrid;
let generation = 0;
let running = false;
let frameInterval = 1000 / 10;
let lastFrameTime = 0;
let animId = null;


const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const stage = document.getElementById('stage');
const btnPlay = document.getElementById('btn-play');
const speedSlider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
const genCounter = document.getElementById('gen-counter');

// ── grid helpers ──────────────────────────────────────────────────────────────

function makeGrid(c, r) {
  return new Uint8Array(c * r);
}

function idx(c, r) {
  return r * cols + c;
}

function initSize() {
  // Space available to the box, inside the stage padding.
  const availW = stage.clientWidth - 2 * STAGE_PAD;
  const availH = stage.clientHeight - 2 * STAGE_PAD;

  // Largest whole number of cells whose grid fits within that space,
  // leaving room for the box's own border on each side.
  const maxGridW = availW - 2 * BOX_BORDER;
  const maxGridH = availH - 2 * BOX_BORDER;
  cols = Math.max(MIN_CELLS, Math.floor(maxGridW / CELL));
  rows = Math.max(MIN_CELLS, Math.floor(maxGridH / CELL));

  const gridW = cols * CELL;
  const gridH = rows * CELL;

  // Grid (canvas) is an exact integer multiple of CELL...
  canvas.width = gridW;
  canvas.height = gridH;

  // ...and the box wraps it snugly: border-box width = grid + its own border,
  // so there is never a gap or an overlap between the box and the grid.
  wrap.style.width = (gridW + 2 * BOX_BORDER) + 'px';
  wrap.style.height = (gridH + 2 * BOX_BORDER) + 'px';

  grid = makeGrid(cols, rows);
  nextGrid = makeGrid(cols, rows);
  generation = 0;
  updateGen();
}

function randomize() {
  for (let i = 0; i < grid.length; i++) grid[i] = Math.random() < 0.3 ? ALIVE : DEAD;
}

function clearGrid() {
  grid.fill(DEAD);
  nextGrid.fill(DEAD);
  generation = 0;
  updateGen();
}

// ── Game of Life step ──────────────────────────────────────────────────────────

function step() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = (r + dr + rows) % rows;
          const nc = (c + dc + cols) % cols;
          n += grid[idx(nc, nr)];
        }
      }
      const alive = grid[idx(c, r)];
      nextGrid[idx(c, r)] = (alive && (n === 2 || n === 3)) || (!alive && n === 3) ? ALIVE : DEAD;
    }
  }
  [grid, nextGrid] = [nextGrid, grid];
  generation++;
  updateGen();
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function draw() {
  const w = canvas.width, h = canvas.height;
  const palette = THEMES[currentTheme];
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = palette.cell;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[idx(c, r)] === ALIVE) {
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
    }
  }

  ctx.strokeStyle = palette.grid;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let c = 0; c <= cols; c++) {
    const x = c * CELL + 0.5;
    ctx.moveTo(x, 0); ctx.lineTo(x, h);
  }
  for (let r = 0; r <= rows; r++) {
    const y = r * CELL + 0.5;
    ctx.moveTo(0, y); ctx.lineTo(w, y);
  }
  ctx.stroke();
}

// ── Animation loop ─────────────────────────────────────────────────────────────

function loop(ts) {
  animId = requestAnimationFrame(loop);
  if (running && ts - lastFrameTime >= frameInterval) {
    step();
    lastFrameTime = ts;
  }
  draw();
}

// ── Controls ──────────────────────────────────────────────────────────────────

function updateGen() {
  genCounter.textContent = `Gen ${generation}`;
}

function setRunning(val) {
  running = val;
  btnPlay.textContent = running ? 'Pause' : 'Play';
}

btnPlay.addEventListener('click', () => setRunning(!running));

speedSlider.addEventListener('input', () => {
  const fps = +speedSlider.value;
  speedVal.textContent = `${fps} fps`;
  frameInterval = 1000 / fps;
});

document.getElementById('btn-random').addEventListener('click', () => {
  clearGrid(); randomize();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  clearGrid();
});

document.getElementById('btn-theme').addEventListener('click', toggleTheme);

// ── Screen → cell coords ───────────────────────────────────────────────────────

function screenToCell(sx, sy) {
  return { c: Math.floor(sx / CELL), r: Math.floor(sy / CELL) };
}

function cellInBounds(c, r) {
  return c >= 0 && c < cols && r >= 0 && r < rows;
}

// ── Mouse input ───────────────────────────────────────────────────────────────

let drawMode = null;

canvas.addEventListener('mousedown', e => {
  if (running) return;
  const rect = canvas.getBoundingClientRect();
  const { c, r } = screenToCell(e.clientX - rect.left, e.clientY - rect.top);
  if (!cellInBounds(c, r)) return;
  drawMode = grid[idx(c, r)] === ALIVE ? DEAD : ALIVE;
  grid[idx(c, r)] = drawMode;
});

canvas.addEventListener('mousemove', e => {
  if (running || drawMode === null) return;
  const rect = canvas.getBoundingClientRect();
  const { c, r } = screenToCell(e.clientX - rect.left, e.clientY - rect.top);
  if (cellInBounds(c, r)) grid[idx(c, r)] = drawMode;
});

window.addEventListener('mouseup', () => { drawMode = null; });

// ── Touch input ───────────────────────────────────────────────────────────────

let touchDrawMode = null;

function getTouchPos(t) {
  const rect = canvas.getBoundingClientRect();
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (running || e.touches.length !== 1) return;
  const pos = getTouchPos(e.touches[0]);
  const { c, r } = screenToCell(pos.x, pos.y);
  if (cellInBounds(c, r)) {
    touchDrawMode = grid[idx(c, r)] === ALIVE ? DEAD : ALIVE;
    grid[idx(c, r)] = touchDrawMode;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (running || touchDrawMode === null || e.touches.length !== 1) return;
  const pos = getTouchPos(e.touches[0]);
  const { c, r } = screenToCell(pos.x, pos.y);
  if (cellInBounds(c, r)) grid[idx(c, r)] = touchDrawMode;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchDrawMode = null;
}, { passive: false });

// ── Resize ─────────────────────────────────────────────────────────────────────

function onResize() {
  initSize();
}

window.addEventListener('resize', onResize);

// ── Button tap flash (removes sticky hover on touch devices) ──────────────────

document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('touchstart', () => {
    btn.classList.add('tap-flash');
    setTimeout(() => btn.classList.remove('tap-flash'), 400);
  }, { passive: true });
});

// ── Init ──────────────────────────────────────────────────────────────────────

applyTheme(currentTheme);
initSize();
randomize();
requestAnimationFrame(loop);
</script>
<script type="module">
  import { generateClipPath } from 'https://esm.sh/@lisse/core@0.4.0';

  function applySquircle(el, radius) {
    function update() {
      const { width, height } = el.getBoundingClientRect();
      if (width > 0 && height > 0) {
        el.style.clipPath = generateClipPath(width, height, { radius });
      }
    }
    new ResizeObserver(update).observe(el);
    update();
  }

  document.querySelectorAll('button').forEach(el => applySquircle(el, 6));
</script>
</body>
</html>
