<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- 3x3 cell grid showing a Game of Life glider -->
  <!-- Empty cells (faint) -->
  <rect x="96"  y="96"  width="90" height="90" rx="14" fill="#2a2a4e"/>
  <rect x="326" y="96"  width="90" height="90" rx="14" fill="#2a2a4e"/>
  <rect x="96"  y="211" width="90" height="90" rx="14" fill="#2a2a4e"/>

  <!-- Live cells (accent) -->
  <rect x="211" y="96"  width="90" height="90" rx="14" fill="#e94560"/>
  <rect x="326" y="211" width="90" height="90" rx="14" fill="#e94560"/>
  <rect x="96"  y="326" width="90" height="90" rx="14" fill="#e94560"/>
  <rect x="211" y="326" width="90" height="90" rx="14" fill="#e94560"/>
  <rect x="326" y="326" width="90" height="90" rx="14" fill="#e94560"/>
</svg>
